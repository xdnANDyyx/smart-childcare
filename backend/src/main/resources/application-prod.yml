spring:
  # MySQL
  datasource:
    type: com.alibaba.druid.spring.boot3.autoconfigure.DruidDataSourceAutoConfigure
    driver-class-name: com.mysql.cj.jdbc.Driver
    druid:
      # 通过环境变量注入，部署时灵活配置
      url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:nursery}?useUnicode=true&characterEncoding=utf8&zeroDateTimeBehavior=convertToNull&useSSL=false&serverTimezone=GMT%2B8&allowPublicKeyRetrieval=true
      username: ${MYSQL_USER:nursery}
      password: ${MYSQL_PASSWORD:nursery_prod_2026}
      initial-size: 5
      min-idle: 5
      max-active: 30
      max-wait: 60000

  # Redis
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DB:0}
      password: ${REDIS_PASSWORD:}
      timeout: 10s
      lettuce:
        pool:
          min-idle: 0
          max-idle: 8
          max-active: 16
          max-wait: -1ms

  # RabbitMQ
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USER:guest}
    password: ${RABBITMQ_PASSWORD:guest}
    virtual-host: ${RABBITMQ_VHOST:/}
    publisher-confirm-type: correlated
    publisher-returns: true
    listener:
      simple:
        acknowledge-mode: manual
        prefetch: 1

# MinIO
minio:
  endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
  access-key: ${MINIO_ACCESS_KEY:minioadmin}
  secret-key: ${MINIO_SECRET_KEY:minioadmin}
  bucket: ${MINIO_BUCKET:nursery}

# 关闭SQL日志
decorator:
  datasource:
    p6spy:
      enable-logging: false

logging:
  level:
    com.zhyyt.nursery: info
  file:
    name: /app/logs/nursery.log
  logback:
    rollingpolicy:
      max-file-size: 50MB
      max-history: 30
