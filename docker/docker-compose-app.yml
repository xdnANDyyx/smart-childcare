# ============================================
# 应用服务器部署文件
# 部署在: 应用一体机（Xeon 4314 / 32GB / 2×480GB SSD + 3×1.2TB SAS）
# 运行: Backend + Redis + MinIO + Nginx
# 连接到数据服务器的 MySQL 和 RabbitMQ
# ============================================

version: '3.8'

services:
  # ======== Redis 缓存 ========
  redis:
    image: redis:7-alpine
    container_name: nursery-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: >
      redis-server
      --appendonly yes
      --requirepass ${REDIS_PASSWORD:-Redis@Nursery2026}
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    networks:
      - nursery-net

  # ======== MinIO 对象存储 ========
  minio:
    image: minio/minio:latest
    container_name: nursery-minio
    restart: always
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-nursery_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-Minio@Nursery2026}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - nursery-net

  # ======== 后端应用 ========
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    image: nursery-backend:latest
    container_name: nursery-backend
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILE: prod
      # 连接数据服务器的MySQL和RabbitMQ（修改为实际IP）
      MYSQL_HOST: ${DATA_SERVER_IP:-192.168.1.100}
      MYSQL_PORT: 3306
      MYSQL_DATABASE: ${MYSQL_DATABASE:-nursery}
      MYSQL_USER: ${MYSQL_USER:-nursery}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-Nursery@Prod2026}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-Redis@Nursery2026}
      RABBITMQ_HOST: ${DATA_SERVER_IP:-192.168.1.100}
      RABBITMQ_PORT: 5672
      RABBITMQ_USER: ${RABBITMQ_USER:-nursery}
      RABBITMQ_PASSWORD: ${RABBITMQ_PASSWORD:-Rabbitmq@Nursery2026}
      RABBITMQ_VHOST: /
      MINIO_ENDPOINT: http://minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-nursery_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-Minio@Nursery2026}
      MINIO_BUCKET: ${MINIO_BUCKET:-nursery}
    volumes:
      - backend-logs:/app/logs
    depends_on:
      - redis
      - minio
    networks:
      - nursery-net

  # ======== Nginx 反向代理 ========
  nginx:
    image: nginx:alpine
    container_name: nursery-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/conf.d:/etc/nginx/conf.d
      - ../frontend-web/dist:/usr/share/nginx/html/web
    depends_on:
      - backend
    networks:
      - nursery-net

volumes:
  redis-data:
  minio-data:
  backend-logs:

networks:
  nursery-net:
    driver: bridge
